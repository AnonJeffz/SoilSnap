<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>SoilSnap - AI-Powered Soil Analysis & Crop Recommendation System</title>
    <meta name="title" content="SoilSnap - AI-Powered Soil Analysis & Crop Recommendation System" />
    <meta name="description" content="Analyze soil composition instantly with AI technology. Get accurate soil classification and personalized crop recommendations to maximize your agricultural productivity. Free soil analysis tool for farmers and agricultural experts." />

    <meta name="author" content="SoilSnap Team" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://soilsnap.site/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://soilsnap.site/" />
    <meta property="og:title" content="SoilSnap - AI-Powered Soil Analysis & Crop Recommendation" />
    <meta property="og:description" content="Analyze soil composition instantly with AI. Get accurate soil classification and crop recommendations to maximize agricultural productivity." />
    <meta property="og:image" content="https://soilsnap.site/images/logo/logo.png" />
    <meta property="og:site_name" content="SoilSnap" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://soilsnap.site/" />
    <meta property="twitter:title" content="SoilSnap - AI-Powered Soil Analysis & Crop Recommendation" />
    <meta property="twitter:description" content="Analyze soil composition instantly with AI. Get accurate soil classification and crop recommendations to maximize agricultural productivity." />
    <meta property="twitter:image" content="https://soilsnap.site/images/logo/logo.png" />

    <!-- Structured Data / Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SoilSnap",
      "url": "https://soilsnap.site",
      "description": "AI-powered soil analysis and crop recommendation system for farmers and agricultural experts",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      }
    }
    </script>

    <!-- PWA setup -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4CAF50" />
    <link rel="apple-touch-icon" href="/images/icon-192x192.png" />
  </head>
  <body class="dark:bg-gray-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
